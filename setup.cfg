# PEP 8 (guía oficial de estilo) — comprobar con: uv run flake8 src/
[flake8]
max-line-length = 79
exclude =
    .git,
    .venv,
    __pycache__,
    build,
    dist,
    *.egg-info
# E203: espacios antes de ':' en slices (compatible con black si se añade)
# W503: salto de línea antes de operador (PEP 8 permite ambos; evita ruido)
extend-ignore = E203, W503
per-file-ignores =
    src/dashboard/main.py:E402
