services:
  - type: web
    name: etl-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      streamlit run src/dashboard/main.py
      --server.port=$PORT
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ALEGRA_EMAIL
        sync: false
      - key: ALEGRA_TOKEN
        sync: false
      - key: ALEGRA_BASE_URL
        value: "https://api.alegra.com/api/v1"
